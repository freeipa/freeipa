topologies:
  build: &build
    name: build
    cpu: 2
    memory: 3800
  master_1repl: &master_1repl
    name: master_1repl
    cpu: 4
    memory: 6750
  master_1repl_1client: &master_1repl_1client
    name: master_1repl_1client
    cpu: 4
    memory: 8000
  master_2repl_1client: &master_2repl_1client
    name: master_2repl_1client
    cpu: 5
    memory: 10750
  ad_master_2client: &ad_master_2client
    name: ad_master_2client
    cpu: 4
    memory: 10596
  master_3client: &master_3client
    name: master_3client
    cpu: 5
    memory: 7750
  adroot_adchild_adtree_master_1client: &adroot_adchild_adtree_master_1client
    name: adroot_adchild_adtree_master_1client
    cpu: 8
    memory: 14466

jobs:
  sssd-fedora/build:
    requires: []
    priority: 100
    job:
      class: Build
      args:
        copr: '@sssd/nightly'
        git_repo: '{git_repo}'
        git_refspec: '{git_refspec}'
        template: &ci-master-latest
          name: freeipa/ci-master-f39
          version: 0.0.1
        timeout: 1800
        topology: *build

  sssd-fedora/test_commands:
    requires: [sssd-fedora/build]
    priority: 50
    job:
      class: RunPytest
      args:
        build_url: '{sssd-fedora/build_url}'
        update_packages: True
        copr: '@sssd/nightly'
        test_suite: test_integration/test_commands.py
        template: *ci-master-latest
        timeout: 5400
        topology: *master_1repl_1client

  sssd-fedora/test_sssd:
    requires: [sssd-fedora/build]
    priority: 50
    job:
      class: RunPytest
      args:
        build_url: '{sssd-fedora/build_url}'
        update_packages: True
        copr: '@sssd/nightly'
        test_suite: test_integration/test_sssd.py
        template: *ci-master-latest
        timeout: 7200
        topology: *adroot_adchild_adtree_master_1client

